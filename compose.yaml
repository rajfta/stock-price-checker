services:
    postgres:
        image: postgres:16
        container_name: stock-price-checker-db
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: stocks
        ports:
            - "5432:5432"
        volumes:
            - db-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d stocks"]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    db-data:
